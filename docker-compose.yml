version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: course_db_container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: course_backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - db
      - currency-service
    environment:
      - DB_URL=host=db user=postgres password= dbname=postgres port=5432 sslmode=disable

  currency-service:
    build: ./currency-service
    container_name: course_currency_service